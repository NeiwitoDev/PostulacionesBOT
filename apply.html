{% extends "base.html" %}
{% block title %}{{ form.title }} · Postulaciones{% endblock %}
{% block content %}
<a class="back-link" href="{{ url_for('home') }}">← Volver</a>
<div class="form-panel">
  <h1 class="page-title">{{ form.title }}</h1>
  {% if form.description %}<p class="page-subtitle">{{ form.description }}</p>{% endif %}

  <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    {% for question in questions %}
    <div class="field">
      <label>{{ loop.index }}. {{ question }}</label>
      <textarea name="q{{ loop.index0 }}" rows="3" required></textarea>
    </div>
    {% endfor %}
    <button class="btn btn-primary" type="submit">Enviar postulación</button>
  </form>
</div>
{% endblock %}
